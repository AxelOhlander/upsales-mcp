      <h1>Sign in to Upsales</h1>
      <p>Use your Upsales account to access the CRM Assistant</p>
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="login-btn" id="login-btn">
          <span class="login-btn-text">Sign in</span>
          <span class="login-btn-loading" style="display:none">
            <span class="spinner-sm"></span> Connecting...
          </span>
        </button>
      </form>
    </div>
  </div>

        <h1>How can I help you today?</h1>
        <p>Search your CRM data — companies, contacts, orders, meetings, and more.</p>
        <div class="suggestions">
          <button class="suggestion">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Show my meetings this week
          </button>
          <button class="suggestion">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

      </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="Ask about your CRM data..." autofocus></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
          </svg>
